<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sawaddee Holland Rayong</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f5f5;
}

/* HEADER */
header{
background:#0f4c5c;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

/* HERO */
.hero{
height:260px;
background:#ccc;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:#333;
}

/* SECTION */
.section{
padding:25px 15px;
text-align:center;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

/* CARD */
.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* IMAGE */
.card img{
width:100%;
height:200px;
object-fit:cover;
display:block;
}

/* TEXT */
.card p{
margin:0;
padding:10px;
font-weight:bold;
background:white;
}

/* SLIDER */
.slider{
position:relative;
height:200px;
}

.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:0.5s;
}

.slide.active{
opacity:1;
}

/* BUTTON */
.btn{
display:inline-block;
margin-top:10px;
padding:10px 20px;
background:#ff7f11;
color:white;
text-decoration:none;
border-radius:8px;
}

/* MOBILE */
@media(max-width:700px){
.grid{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<header>Sawaddee Holland Rayong</header>

<!-- HERO (werkt ook zonder foto) -->
<div class="hero">
<div>
<h2>🌴 Welcome to Rayong</h2>
<a class="btn" href="https://wa.me/66811520624">💬 WhatsApp</a>
</div>
</div>

<!-- ROOMS -->
<div class="section">
<h2>Rooms</h2>

<div class="grid">

<!-- ROOM 1 -->
<div class="card">
<div class="slider">
<img class="slide room1 active" src="room1.jpg" onerror="this.style.display='none'">
<img class="slide room1" src="room1b.jpg" onerror="this.style.display='none'">
<img class="slide room1" src="bathroom.jpg" onerror="this.style.display='none'">
</div>
<p>🌿 Comfort Room • Airco • WiFi • From 1200 THB / night</p>
</div>

<!-- ROOM 2 -->
<div class="card">
<div class="slider">
<img class="slide room2 active" src="room2.jpg" onerror="this.style.display='none'">
<img class="slide room2" src="room2b.jpg" onerror="this.style.display='none'">
</div>
<p>🌴 Family Room • Spacious • From 1800 THB / night</p>
</div>

</div>
</div>

<!-- RESTAURANT -->
<div class="section">
<h2>Restaurant & Bar</h2>

<div class="grid">
<div class="card">
<img src="restaurant.jpg" onerror="this.style.display='none'">
</div>

<div class="card">
<img src="bar.jpg" onerror="this.style.display='none'">
</div>
</div>

</div>

<!-- GARDEN -->
<div class="section">
<h2>🌴 Outside & Garden</h2>

<div class="card">
<img src="garden.jpg" onerror="this.style.display='none'">
<p>Relax in our tropical garden near the beach</p>
</div>

</div>

<!-- GOOGLE MAPS -->
<div class="section">
<h2>📍 Location</h2>

<iframe 
src="https://www.google.com/maps?q=Rayong&output=embed"
width="100%" 
height="250" 
style="border:0;">
</iframe>

</div>

<script>
function slider(name){
let slides=document.querySelectorAll("."+name);
if(slides.length === 0) return;

let i=0;

setInterval(()=>{
slides.forEach(s=>s.classList.remove("active"));
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);
}

slider("room1");
slider("room2");
</script>

</body>
</html>
